# Copy into your brain-host repo (or any repo) as .github/workflows/know-wake.yml.
# Pokes the brain hourly so off-box KB edits are reconciled without waiting for the
# next Claude Code session. Replace KNOW_WAKE_URL with your brain's /wake endpoint.
#
# The /wake URL does not include the MCP secret — it is an unauthenticated liveness
# route. Protect it at the network edge if your brain is not already private.

name: know-wake

on:
  schedule:
    - cron: "0 * * * *"   # hourly
  workflow_dispatch:

jobs:
  wake:
    runs-on: ubuntu-latest
    steps:
      - name: POST /wake
        run: |
          curl -fsS -X POST "${{ vars.KNOW_WAKE_URL }}"
        # Set KNOW_WAKE_URL in repo Settings → Secrets and variables → Actions → Variables
        # e.g. https://your-brain-host/wake
